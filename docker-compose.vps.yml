# Production stack for EC2 / VPS — used by ./deploy.sh (project: planary-web-vps)
#
# Normal deploy: image from GHCR (built in GitHub Actions). VPS only pulls.
# The `build:` block is for DEPLOY_BUILD_LOCAL=1 fallback only.

name: planary-web-vps

services:
  planary:
    image: ${PLANARY_WEB_IMAGE:-ghcr.io/somadina94/expenses-tracker-web:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
        NEXT_PUBLIC_VAPID_PRIVATE_KEY: ${NEXT_PUBLIC_VAPID_PRIVATE_KEY}
    container_name: planary
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      NEXT_PUBLIC_VAPID_PRIVATE_KEY: ${NEXT_PUBLIC_VAPID_PRIVATE_KEY}
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    networks:
      - planary-web-vps-network

networks:
  planary-web-vps-network:
    driver: bridge
